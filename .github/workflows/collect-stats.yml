name: 정비사업 통계 배치 수집 (정비몽땅)

on:
  schedule:
    # 매월 15일 02:00 UTC (한국 11:00) — update-market-cache.yml(1일)과 분산
    - cron: '0 2 15 * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: '최대 수집 페이지 수 (0=전체, 테스트 시 소수 지정)'
        required: false
        default: '0'
      dry_run:
        description: 'dry-run — Supabase 저장 없이 수집 확인만'
        required: false
        default: 'false'
        type: boolean

jobs:
  collect:
    runs-on: ubuntu-latest
    # 전수 수집 시 수 시간 소요 가능 (600ms 딜레이 × 수백 건)
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 통계 수집 배치 실행
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""

          MAX_PAGES="${{ github.event.inputs.max_pages || '0' }}"
          if [ "$MAX_PAGES" != "0" ]; then
            ARGS="$ARGS --max-pages $MAX_PAGES"
          fi

          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          npx tsx scripts/collect-stats.ts $ARGS
